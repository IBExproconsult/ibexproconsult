/* =========================================================

:root {

  --accent: #0071E3;
  --accent-hover: #0077ED;
  --accent-light: rgba(0,113,227,0.12);
  --primary: #0071E3;
  --primary-h: #0077ED;
  --ib-blue: #0071E3;
  --ib-blue-h: #0077ED;
  --ib-blue-glow: rgba(0,113,227,0.15);
  --gold: #FF9F0A;
  --green: #34C759;
  --red: #FF3B30;
  --orange: #FF9500;
  --purple: #AF52DE;
  --teal: #5AC8FA;
  --cyan: #5AC8FA;
  --success: #34C759;
  --warning: #FF9F0A;
  --danger: #FF3B30;
  --info: #5AC8FA;
  --text: #1D1D1F;
  --text-muted: #6E6E73;
  --text-dim: #AEAEB2;
  --text-faint: #AEAEB2;
  --radius: 10px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --text-xs: 10px;
  --text-sm: 12px;
  --text-base: 13px;
  --text-md: 14px;
  --text-lg: 16px;
  --text-xl: 20px;
  --text-2xl: 28px;

      --header-h: 56px;
      --sidebar-w: 340px;
    }

/* RESET */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.5; overflow-x: hidden; }
a { color: var(--accent); text-decoration: none; }
button { cursor: pointer; border: none; font-family: inherit; }
input, select, textarea { font-family: inherit; }
.tabular { font-variant-numeric: tabular-nums lining-nums; }

/* PAGE */
.page { min-height: 100vh; display: flex; flex-direction: column; }

/* NAV */
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-shrink: 0;
}
.nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; color: var(--text); }
.nav-logo svg { flex-shrink: 0; }
.nav-back {
  display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted);
  padding: 6px 12px; border-radius: 6px; background: var(--surface2);
  border: 1px solid var(--border); transition: all 0.15s;
}
.nav-back:hover { color: var(--text); border-color: var(--accent); }
.nav-links { display: flex; gap: 6px; align-items: center; }
.nav-link {
  font-size: 12px; padding: 5px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text-muted); transition: all 0.15s; font-weight: 500;
}
.nav-link:hover { color: var(--text); border-color: var(--accent); }
.nav-spacer { flex: 1; }
.nav-badge {
  font-size: 11px; background: rgba(0,113,227,0.12); color: var(--accent);
  border: 1px solid rgba(0,113,227,0.3); padding: 3px 10px; border-radius: 20px;
  font-weight: 600; letter-spacing: 0.03em;
}

/* MAIN */
.main-content { flex: 1; padding: 24px; max-width: 1440px; margin: 0 auto; width: 100%; }

/* TABS */
.tab-bar {
  display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 4px; margin-bottom: 24px; overflow-x: auto;
}
.tab-btn {
  padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
  background: transparent; color: var(--text-muted); white-space: nowrap; transition: all 0.15s;
}
.tab-btn:hover { color: var(--text); background: var(--surface2); }
.tab-btn.active { background: var(--accent); color: #fff; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* CARD */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
}
.card h3 { font-size: 15px; margin-bottom: 16px; font-weight: 700; }

/* KPI */
.kpi-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; text-align: center;
}
.kpi-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.kpi-value { font-size: 22px; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
.kpi-unit { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

/* TABLE */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table thead th {
  padding: 10px 12px; text-align: left; color: var(--text-muted);
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
  border-bottom: 2px solid var(--border); font-weight: 600; white-space: nowrap;
}
.data-table tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tbody tr:hover { background: var(--surface2); }
.data-table th.right, .data-table td.right { text-align: right; }
.data-table th.center, .data-table td.center { text-align: center; }

/* BADGES */
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.badge-green { background: rgba(16,185,129,0.15); color: var(--green); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-yellow { background: rgba(245,158,11,0.15); color: var(--gold); }
.badge-blue { background: rgba(0,113,227,0.15); color: var(--accent); }
.badge-orange { background: rgba(249,115,22,0.15); color: var(--orange); }
.badge-purple { background: rgba(168,85,247,0.15); color: var(--purple); }

/* BUTTONS */
.btn {
  padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-green { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
.btn-green:hover { background: rgba(16,185,129,0.25); }

/* MODAL */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 200; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 28px; max-width: 700px;
  width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow);
}
.modal h3 { font-size: 17px; margin-bottom: 20px; }
.modal-close {
  float: right; background: none; color: var(--text-muted); font-size: 20px;
  padding: 4px 8px; border-radius: 6px;
}
.modal-close:hover { color: var(--text); background: var(--surface2); }

/* FORM */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 10px 14px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 13px; transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* RANGE SLIDER */
.range-group { margin-bottom: 14px; }
.range-group label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.range-group label span { color: var(--text); font-weight: 600; }
input[type="range"] {
  -webkit-appearance: none; width: 100%; height: 6px; background: var(--border);
  border-radius: 3px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--accent); cursor: pointer;
}

/* LAYOUT HELPERS */
.split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.sidebar-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
.three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

/* FOOTER */
.site-footer {
  text-align: center; padding: 20px; color: var(--text-dim);
  font-size: 12px; border-top: 1px solid var(--border);
}
.site-footer a { color: var(--text-muted); }

/* TEMPLATE CARD */
.template-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; display: flex;
  flex-direction: column; gap: 12px;
}
.template-card h4 { font-size: 14px; font-weight: 700; }
.template-card p { font-size: 12px; color: var(--text-muted); line-height: 1.6; flex: 1; }
.template-actions { display: flex; gap: 8px; }

/* QA CARD */
.qa-item {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 20px; margin-bottom: 12px;
}
.qa-item .qa-q { font-weight: 700; font-size: 14px; margin-bottom: 8px; color: var(--accent); }
.qa-item .qa-a { font-size: 13px; color: var(--text-muted); line-height: 1.7; }

/* PRINT REPORT AREA */
.report-area {
  background: #FFFFFF; border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 24px; margin-top: 16px;
  font-size: 13px; line-height: 1.7;
}
.report-area h2 { font-size: 18px; margin-bottom: 16px; color: var(--accent); }
.report-area h4 { font-size: 14px; margin-top: 16px; margin-bottom: 8px; }
.report-area table { width: 100%; border-collapse: collapse; margin: 10px 0; }
.report-area table th, .report-area table td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; font-size: 12px; }
.report-area table th { color: var(--text-muted); font-size: 11px; text-transform: uppercase; }

/* RESPONSIVE */
@media (max-width: 1024px) {
  .sidebar-layout { grid-template-columns: 1fr; }
  .split { grid-template-columns: 1fr; }
  .three-col { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .nav { padding: 0 12px; gap: 8px; }
  .nav-links { display: none; }
  .main-content { padding: 16px; }
  .form-row { grid-template-columns: 1fr; }
}

/* ── Dark mode ──────────────────────────────────────────── */

  return '<span class="badge badge-green">Lezárt</span>';
}

function animateCount(el, target, suffix, duration) {
  const start = 0;
  const startTime = performance.now();
  function step(t) {
    const p = Math.min((t - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - p, 3);
    const val = Math.round(start + (target - start) * ease);
    el.textContent = fmt(val) + (suffix || '');
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function updateUtilityCalc() {

  if (!prop) return;

  const infoEl = document.getElementById('utility-info');
  if (infoEl) infoEl.innerHTML = `<span class="badge badge-blue">${prop.sqm} m²</span><span class="badge badge-purple">${prop.type}</span><span class="badge badge-green">${prop.district}. ker.</span>`;

  // Set sliders to benchmark based on sqm
  const sizeKey = prop.sqm <= 60 ? 'small' : prop.sqm <= 80 ? 'medium' : 'large';

  const gas = parseInt(document.getElementById('gas-slider')?.value || UTILITY_BENCHMARKS.gas[sizeKey]);
  const elec = parseInt(document.getElementById('elec-slider')?.value || UTILITY_BENCHMARKS.electric[sizeKey]);
  const water = parseInt(document.getElementById('water-slider')?.value || UTILITY_BENCHMARKS.water[sizeKey]);
  const common = parseInt(document.getElementById('common-slider')?.value || UTILITY_BENCHMARKS.common[sizeKey]);

  document.getElementById('gas-val').textContent = fmt(gas);
  document.getElementById('elec-val').textContent = fmt(elec);
  document.getElementById('water-val').textContent = fmt(water);
  document.getElementById('common-val').textContent = fmt(common);

  const totalMonthly = gas + elec + water + common;
  const annual = totalMonthly * 12;
  const perSqm = Math.round(totalMonthly / prop.sqm);
  const marketAvg = prop.sqm <= 60 ? 600 : prop.sqm <= 80 ? 500 : 450;
  const delta = perSqm - marketAvg;

  // Maintenance budget
  const estValue = (PROPERTY_VALUES[prop.district] || 700000) * prop.sqm;

  const results = document.getElementById('utility-results');
  if (!results) return;

        <div><span style="font-size:11px;color:var(--text-muted);display:block;">Rezsi / m²</span><strong style="font-size:16px;">${fmt(perSqm)} Ft/m²</strong></div>
        <div><span style="font-size:11px;color:var(--text-muted);display:block;">Piaci átlag / m²</span><strong style="font-size:16px;color:${delta > 50 ? 'var(--red)' : delta < -50 ? 'var(--green)' : 'var(--text)'};">${fmt(marketAvg)} Ft/m² (${delta >= 0 ? '+' : ''}${fmt(delta)})</strong></div>

      <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px;">Becsült ingatlanérték: ${fmtFt(estValue)} × 1,5% / 12</div>

function calcIndexation() {
  const rent = parseInt(document.getElementById('idx-rent').value) || 300000;
  const inflation = parseFloat(document.getElementById('idx-inflation').value) || 4.4;
  const mode = document.getElementById('idx-mode').value;
  const lastDate = document.getElementById('idx-date').value;

  let pct;
  switch(mode) {
    case 'inflation': pct = inflation; break;
    case 'inflPlus2': pct = inflation + 2; break;
    case 'inflPlus3': pct = inflation + 3; break;
    case 'fixed5': pct = 5; break;
    case 'fixed10': pct = 10; break;
    default: pct = inflation;
  }

  const newRent = Math.round(rent * (1 + pct / 100));
  const diff = newRent - rent;

  const el = document.getElementById('idx-result');

function openTemplate(key) {
  currentTemplateKey = key;
  const t = TEMPLATES[key];
  document.getElementById('template-modal-title').textContent = t.title;
  document.getElementById('template-editor').value = t.content;
  openModal('template-modal');
}

function downloadTemplate() {
  if (!currentTemplateKey) return;
  const content = document.getElementById('template-editor').value;
  const t = TEMPLATES[currentTemplateKey];
  const blob = new Blob([content], {type: 'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = t.title.replace(/\s+/g, '_') + '.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

function downloadTemplateDirect(key) {
  const t = TEMPLATES[key];
  const blob = new Blob([t.content], {type: 'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = t.title.replace(/\s+/g, '_') + '.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

function generateReport() {
  const owner = document.getElementById('report-owner').value;
  const props = MANAGED_PROPERTIES.filter(p => p.owner === owner);
  const tickets = window._APP_STORE.pmTickets;

  if (props.length === 0) {
    document.getElementById('report-output').innerHTML = '<p style="margin-top:16px;color:var(--text-muted);">Nincs ingatlan ehhez a tulajdonoshoz.</p>';
    return;
  }

  const rented = props.filter(p => p.status === 'Bérelt');
  const free = props.filter(p => p.status === 'Szabad');
  const maint = props.filter(p => p.status === 'Karbantartás');
  const totalIncome = rented.reduce((s, p) => s + p.rent, 0);
  const avgUtility = Math.round(props.reduce((s, p) => s + p.sqm * 350, 0));
  const mgmtFee = Math.round(totalIncome * 0.15);
  const netIncome = totalIncome - avgUtility - mgmtFee;

  const now = new Date('2026-03-15');
  const d90 = new Date(now.getTime() + 90 * 86400000);
  const expiring = props.filter(p => p.lease_end && new Date(p.lease_end) <= d90 && new Date(p.lease_end) >= now);

  const ownerTickets = tickets.filter(t => {
    const prop = getPropertyById(t.property);
    return prop && prop.owner === owner && t.status !== 'Lezárt';
  });

  document.getElementById('print-report-btn').style.display = 'inline-flex';

  document.getElementById('report-output').innerHTML = `
    <div class="report-area" id="printable-report">
      <h2>Havi tulajdonosi riport — ${owner}</h2>
      <div style="color:var(--text-muted);font-size:12px;margin-bottom:16px;">Időszak: 2026. március | Készítette: IB Exproconsult | Dátum: 2026-03-15</div>

      <h4>1. Portfólió összefoglaló</h4>
      <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap;">
        <div style="padding:8px 16px;background:rgba(0,113,227,0.1);border-radius:8px;">Összes: <strong>${props.length} db</strong></div>
        <div style="padding:8px 16px;background:rgba(16,185,129,0.1);border-radius:8px;">Bérelt: <strong style="color:var(--green)">${rented.length}</strong></div>
        <div style="padding:8px 16px;background:rgba(239,68,68,0.1);border-radius:8px;">Szabad: <strong style="color:var(--red)">${free.length}</strong></div>
        <div style="padding:8px 16px;background:rgba(245,158,11,0.1);border-radius:8px;">Karbantartás: <strong style="color:var(--gold)">${maint.length}</strong></div>
      </div>

      <h4>2. Pénzügyi összesítő</h4>
      <table>
        <tr><td>Havi bérleti bevétel (bruttó)</td><td style="text-align:right;font-weight:700;">${fmtFt(totalIncome)}</td></tr>
        <tr><td>Becsült közüzemi költség</td><td style="text-align:right;color:var(--orange);">-${fmtFt(avgUtility)}</td></tr>
        <tr><td>Ingatlankezelői díj (15%)</td><td style="text-align:right;color:var(--orange);">-${fmtFt(mgmtFee)}</td></tr>
        <tr style="border-top:2px solid var(--border);"><td><strong>Nettó bevétel</strong></td><td style="text-align:right;font-weight:700;color:var(--green);">${fmtFt(netIncome)}</td></tr>
      </table>

      <h4>3. Ingatlanonkénti részletezés</h4>
      <table>
        <thead><tr><th>Cím</th><th>Bérlő</th><th style="text-align:right">Bérleti díj</th><th style="text-align:center">Státusz</th><th style="text-align:center">Szerz. lejárat</th></tr></thead>
        <tbody>
          ${props.map(p => `<tr>
            <td>${p.address}</td>
            <td>${p.tenant || '—'}</td>
            <td style="text-align:right;font-weight:600;">${fmtFt(p.rent)}</td>
            <td style="text-align:center;">${statusBadge(p.status)}</td>
            <td style="text-align:center;">${p.lease_end || '—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>

      ${ownerTickets.length > 0 ? `
        <h4>4. Nyitott karbantartási feladatok</h4>
        <table>
          <thead><tr><th>Ingatlan</th><th>Típus</th><th>Leírás</th><th style="text-align:right">Ktg</th><th style="text-align:center">Státusz</th></tr></thead>
          <tbody>
            ${ownerTickets.map(t => {
              const prop = getPropertyById(t.property);
              return `<tr>
                <td>${prop ? prop.address : t.property}</td>
                <td>${t.type}</td>
                <td>${t.desc}</td>
                <td style="text-align:right;">${fmtFt(t.cost)}</td>
                <td style="text-align:center;">${ticketStatusBadge(t.status)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      ` : '<h4>4. Karbantartás</h4><p style="color:var(--text-muted);">Nincs nyitott karbantartási feladat.</p>'}

      ${expiring.length > 0 ? `
        <h4>5. Lejáró szerződések (90 napon belül)</h4>
        <table>
          <thead><tr><th>Ingatlan</th><th>Bérlő</th><th style="text-align:center">Lejárat</th><th style="text-align:right">Havi díj</th></tr></thead>

        ${free.length > 0 ? `<li>Üres ingatlan(ok) hirdetése: ${free.map(p => p.address).join(', ')}</li>` : ''}
        ${maint.length > 0 ? `<li>Karbantartás alatt álló ingatlan(ok): ${maint.map(p => p.address).join(', ')}</li>` : ''}
        ${expiring.length > 0 ? `<li>Szerződés-megújítás egyeztetése: ${expiring.map(p => p.tenant).join(', ')}</li>` : ''}
        ${ownerTickets.length > 0 ? `<li>Karbantartási munkák jóváhagyása: ${ownerTickets.length} db nyitott ticket</li>` : ''}
        <li>Éves bérleti díj indexálás felülvizsgálata (KSH infláció: 4,4%)</li>
      </ul>
    </div>
  `;
}

function printReport() {
  const el = document.getElementById('printable-report');
  if (!el) return;
  const css = 'body{font-family:Arial,sans-serif;padding:30px;font-size:13px;line-height:1.7;}table{width:100%;border-collapse:collapse;margin:10px 0;}th,td{padding:6px 10px;border-bottom:1px solid #ddd;text-align:left;}h2{color:#0071E3;}h4{margin-top:18px;margin-bottom:6px;}.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;}';
  const html = '<html><head><title>Tulajdonosi Riport</title><style>' + css + '<\/style><\/head><body>' + el.innerHTML + '<\/body><\/html>';
  const blob = new Blob([html], {type: 'text/html'});
  const url = URL.createObjectURL(blob);
  const w = window.open(url, '_blank');
  setTimeout(function() { if (w) { w.print(); } URL.revokeObjectURL(url); }, 600);
}

function getAssistantResponse(q) {
  var ql = q.toLowerCase().replace(/[?!.,]/g, '');
  var best = null, bestScore = 0;
  for (var i = 0; i < KB.length; i++) {
    var score = 0;
    for (var j = 0; j < KB[i].k.length; j++) {
      if (ql.indexOf(KB[i].k[j]) !== -1) {
        score += KB[i].k[j].length;
      }
    }
    if (score > bestScore) { bestScore = score; best = KB[i]; }
  }
  if (best) return best.a;
  // Fallback — try to suggest relevant pages
  var suggestions = [];
  if (/kerület|district/.test(ql)) suggestions.push('index.html (piaci áttekintés)', 'simulator.html (fordított keresés)');
  if (/pénz|cost|ár|price/.test(ql)) suggestions.push('simulator.html (kalkulátorok)', 'development.html (pro forma)');
  if (/bérl|rent/.test(ql)) suggestions.push('index.html (bérleti térkép)', 'crm.html (bérlő kezelés)');
  if (/fejleszt|build|épít/.test(ql)) suggestions.push('development.html (fejlesztési tracker)');
  if (suggestions.length > 0) {
    return 'Ezt a kérdést nem találom az adatbázisomban, de lehet, hogy ezeken az oldalakon megtalálod, amit keresel:\n• ' + suggestions.join('\n• ') + '\nPróbáld pontosítani a kérdést!';
  }
  return 'Ezt a kérdést nem találom az adatbázisomban. Próbáld pontosítani, vagy kérdezz rá a következő témákra: szimulátor, bérleti díjak, hozamszámítás, adózás, fejlesztés, OTÉK, due diligence, CRM, parkoló, kollégium, ingatlankezelés.';
}

document.body.appendChild(panel);

var msgs = document.getElementById('ib-msgs');
var input = document.getElementById('ib-input');
var chips = document.getElementById('ib-chips');
var closeBtn = panel.querySelector('.ib-close');
var sendBtn = panel.querySelector('.ib-send');
var isOpen = false;
var chipsShown = true;

// Init chat history store
if (typeof window._APP_STORE === 'undefined') window._APP_STORE = {};
if (!window._APP_STORE.chatHistory) window._APP_STORE.chatHistory = [];

var SUGGESTED = [
  'Hogyan számolok fejlesztési hozamot?',
  'Melyik kerületbe érdemes beruházni?',
  'Hol találom az adózási kalkulátort?',
  'Mi a Land Residual módszer?',
  'Hogyan működik a közmű kapacitás ellenőrzés?',
  'Mikor frissülnek az adatok?'
];

// Render chips
SUGGESTED.forEach(function(txt) {
  var c = document.createElement('button');
  c.className = 'ib-chip';
  c.textContent = txt;
  c.addEventListener('click', function() { sendMessage(txt); });
  chips.appendChild(c);
});

function ts() {
  var d = new Date();
  return (d.getHours() < 10 ? '0' : '') + d.getHours() + ':' + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
}

function addMsg(text, who) {
  var div = document.createElement('div');
  div.className = 'ib-msg ' + who;
  div.innerHTML = text.replace(/\n/g, '<br>') + '<span class="ib-ts">' + ts() + '</span>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  window._APP_STORE.chatHistory.push({who: who, text: text, time: ts()});
}

function showTyping() {
  var t = document.createElement('div');
  t.className = 'ib-typing';
  t.id = 'ib-typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(t);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  var t = document.getElementById('ib-typing');
  if (t) t.remove();
}

function sendMessage(text) {
  if (!text || !text.trim()) return;
  addMsg(text.trim(), 'user');
  input.value = '';
  // Hide chips after first user message
  if (chipsShown) { chips.style.display = 'none'; chipsShown = false; }
  // Typing indicator
  showTyping();
  setTimeout(function() {
    hideTyping();
    var answer = getAssistantResponse(text.trim());
    addMsg(answer, 'bot');
  }, 600);
}

// Toggle panel
btn.addEventListener('click', function() {
  isOpen = !isOpen;
  if (isOpen) {
    panel.classList.add('open');
    btn.querySelector('.ib-badge').style.display = 'none';
    input.focus();
    // Restore previous messages
    if (msgs.children.length === 0 && window._APP_STORE.chatHistory.length === 0) {
      addMsg('Üdvözöllek! 👋 Az IB Assistant vagyok. Kérdezz bátran a Budapest Dashboard rendszerről — segítek eligazodni a modulok, kalkulátorok és adatok között.', 'bot');
    }
  } else {
    panel.classList.remove('open');
  }
});

closeBtn.addEventListener('click', function() {
  isOpen = false;
  panel.classList.remove('open');
});

// Send on Enter or click
input.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendMessage(input.value); });
sendBtn.addEventListener('click', function() { sendMessage(input.value); });

})();
</script>
</body>
</html>
