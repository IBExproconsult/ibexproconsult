:root {
  --bg: #F5F5F7;
  --surface: #FFFFFF;
  --surface-2: #F5F5F7;
  --surface2: #F5F5F7;
  --surface-3: #E5E5EA;
  --border: rgba(0,0,0,0.08);
  --border-h: rgba(0,0,0,0.14);
  --accent: #0071E3;
  --accent-hover: #0077ED;
  --accent-light: rgba(0,113,227,0.12);
  --primary: #0071E3;
  --primary-h: #0077ED;
  --ib-blue: #0071E3;
  --ib-blue-h: #0077ED;
  --ib-blue-glow: rgba(0,113,227,0.15);
  --gold: #FF9F0A;
  --green: #34C759;
  --red: #FF3B30;
  --orange: #FF9500;
  --purple: #AF52DE;
  --teal: #5AC8FA;
  --cyan: #5AC8FA;
  --success: #34C759;
  --warning: #FF9F0A;
  --danger: #FF3B30;
  --info: #5AC8FA;
  --text: #1D1D1F;
  --text-muted: #6E6E73;
  --text-dim: #AEAEB2;
  --text-faint: #AEAEB2;
  --radius: 10px;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 18px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --text-xs: 10px;
  --text-sm: 12px;
  --text-base: 13px;
  --text-md: 14px;
  --text-lg: 16px;
  --text-xl: 20px;
  --text-2xl: 28px;

      --header-h: 56px;
      --sidebar-w: 340px;
    }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px; line-height:1.5; overflow-x:hidden; }
a { color:var(--accent); text-decoration:none; }
button { cursor:pointer; border:none; font-family:inherit; }
input,select,textarea { font-family:inherit; }
.tabular { font-variant-numeric:tabular-nums lining-nums; }
.page { min-height:100vh; display:flex; flex-direction:column; }

/* NAV */
.nav {
  background:var(--surface); border-bottom:1px solid var(--border);
  padding:0 24px; height:56px; display:flex; align-items:center; gap:12px;
  position:sticky; top:0; z-index:1000; flex-shrink:0;
}
.nav-logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:15px; color:var(--text); }
.nav-logo svg { flex-shrink:0; }
.nav-back {
  display:flex; align-items:center; gap:6px; font-size:13px; color:var(--text-muted);
  padding:6px 12px; border-radius:6px; background:var(--surface2);
  border:1px solid var(--border); transition:all 0.15s;
}
.nav-back:hover { color:var(--text); border-color:var(--accent); }
.nav-spacer { flex:1; }
.nav-badge {
  font-size:11px; background:rgba(249,115,22,0.12); color:#FF9500;
  border:1px solid rgba(249,115,22,0.3); padding:3px 10px; border-radius:20px;
  font-weight:600; letter-spacing:0.03em;
}
.nav-link {
  display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600;
  padding:5px 10px; border-radius:6px; text-decoration:none; transition:all 0.15s;
}

/* MAIN */
.main-content { flex:1; padding:24px; max-width:1440px; margin:0 auto; width:100%; }

/* TABS */
.tab-bar {
  display:flex; gap:4px; background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius); padding:4px; margin-bottom:24px; overflow-x:auto;
}
.tab-btn {
  padding:10px 18px; border-radius:8px; font-size:13px; font-weight:600;
  background:transparent; color:var(--text-muted); white-space:nowrap; transition:all 0.15s;
}
.tab-btn:hover { color:var(--text); background:var(--surface2); }
.tab-btn.active { background:var(--accent); color:#fff; }
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* CARD */
.card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:20px; box-shadow:var(--shadow); margin-bottom:20px;
}
.card-title { font-size:16px; font-weight:700; margin-bottom:16px; display:flex; align-items:center; gap:8px; }

/* KPI */
.kpi-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:24px; }
.kpi-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 18px;
}
.kpi-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; }
.kpi-value { font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; }
.kpi-sub { font-size:12px; color:var(--text-muted); margin-top:2px; }

/* KANBAN */
.kanban-container { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:24px; }
.kanban-col {
  background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:14px; min-height:200px;
}
.kanban-header {
  font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;
  padding:6px 10px; border-radius:6px; margin-bottom:12px; text-align:center;
}
.kanban-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:12px; margin-bottom:10px; transition:transform 0.15s, box-shadow 0.15s;
}
.kanban-card:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,0.3); }
.kanban-card-title { font-size:13px; font-weight:700; margin-bottom:6px; }
.kanban-card-meta { font-size:11px; color:var(--text-muted); line-height:1.6; }
.kanban-card-meta span { display:block; }
.kanban-card-badge {
  display:inline-block; font-size:10px; font-weight:600; padding:2px 8px;
  border-radius:4px; margin-top:6px;
}

/* TABLE */
.data-table { width:100%; border-collapse:collapse; font-size:13px; }
.data-table th {
  text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.05em;
  color:var(--text-muted); padding:10px 12px; border-bottom:2px solid var(--border);
  font-weight:600;
}
.data-table td { padding:10px 12px; border-bottom:1px solid var(--border); }
.data-table tr:hover { background:var(--surface2); }

/* FORM */
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:12px; font-weight:600; color:var(--text-muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.03em; }
.form-input {
  width:100%; padding:10px 14px; background:var(--surface2); border:1px solid var(--border);
  border-radius:8px; color:var(--text); font-size:14px; transition:border-color 0.15s;
}
.form-input:focus { outline:none; border-color:var(--accent); }
.form-slider { width:100%; accent-color:var(--accent); }
.form-radio-group { display:flex; flex-wrap:wrap; gap:8px; }
.form-radio {
  display:flex; align-items:center; gap:6px; padding:8px 14px;
  background:var(--surface2); border:1px solid var(--border); border-radius:8px;
  cursor:pointer; font-size:13px; transition:all 0.15s;
}
.form-radio:has(input:checked) { border-color:var(--accent); background:var(--accent-light); color:var(--accent); }
.form-radio input { accent-color:var(--accent); }

/* SENSITIVITY */
.sens-table { width:100%; border-collapse:collapse; text-align:center; }
.sens-table th, .sens-table td { padding:10px 14px; border:1px solid var(--border); font-size:13px; }
.sens-table th { background:var(--surface2); font-weight:600; font-size:11px; text-transform:uppercase; color:var(--text-muted); }
.sens-cell-red { background:rgba(239,68,68,0.15); color:#FF3B30; font-weight:700; }
.sens-cell-yellow { background:rgba(245,158,11,0.15); color:#FF9F0A; font-weight:700; }
.sens-cell-green { background:rgba(16,185,129,0.15); color:#34C759; font-weight:700; }

/* TIMELINE */
.milestone-timeline { position:relative; display:flex; align-items:flex-start; justify-content:space-between; padding:30px 0 40px; margin:20px 0; }
.milestone-timeline::before {
  content:''; position:absolute; top:42px; left:0; right:0; height:3px;
  background:var(--border);
}
.milestone-node { position:relative; display:flex; flex-direction:column; align-items:center; z-index:1; flex:1; max-width:120px; }
.milestone-dot {
  width:18px; height:18px; border-radius:50%; border:3px solid var(--border);
  background:var(--surface); margin-bottom:10px;
}
.milestone-dot.completed { background:var(--green); border-color:var(--green); }
.milestone-dot.active { background:var(--accent); border-color:var(--accent); animation:pulse 2s infinite; }
.milestone-dot.upcoming { background:var(--surface); border-color:var(--text-dim); }
@keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(0,113,227,0.4)} 50%{box-shadow:0 0 0 8px rgba(0,113,227,0)} }
.milestone-label { font-size:10px; text-align:center; color:var(--text-muted); line-height:1.3; max-width:90px; }

/* GANTT */
.gantt-container { overflow-x:auto; margin:20px 0; }
.gantt-table { width:100%; min-width:900px; border-collapse:collapse; }
.gantt-table th { font-size:10px; padding:6px 4px; text-align:center; color:var(--text-muted); border-bottom:1px solid var(--border); font-weight:600; }
.gantt-table td { padding:4px; border-bottom:1px solid var(--border); position:relative; height:32px; }
.gantt-project-name { font-size:12px; font-weight:600; white-space:nowrap; padding:4px 10px; min-width:140px; }
.gantt-bar {
  position:absolute; top:4px; bottom:4px; border-radius:4px; min-width:4px;
}
.gantt-milestone { position:absolute; top:50%; transform:translate(-50%,-50%) rotate(45deg); width:8px; height:8px; background:var(--gold); }

/* ALERTS */
.alert-card {
  padding:14px 18px; border-radius:var(--radius); margin-bottom:12px;
  display:flex; align-items:center; gap:12px; font-size:13px;
}
.alert-red { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#FF3B30; }
.alert-yellow { background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.3); color:#FF9F0A; }
.alert-green { background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.3); color:#34C759; }

/* FINANCE CARDS */
.fin-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; margin:20px 0; }
.fin-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:20px; transition:transform 0.15s;
}
.fin-card:hover { transform:translateY(-2px); }
.fin-card-title { font-size:15px; font-weight:700; margin-bottom:8px; }
.fin-card-row { font-size:12px; color:var(--text-muted); margin-bottom:4px; }
.fin-card-row strong { color:var(--text); }

/* DOCUMENT CARDS */
.doc-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:16px; }
.doc-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:20px; display:flex; flex-direction:column;
}
.doc-card-title { font-size:15px; font-weight:700; margin-bottom:6px; display:flex; align-items:center; gap:8px; }
.doc-card-desc { font-size:12px; color:var(--text-muted); margin-bottom:14px; flex:1; }
.doc-card-actions { display:flex; gap:8px; }

/* BUTTONS */
.btn {
  display:inline-flex; align-items:center; gap:6px; padding:8px 16px;
  border-radius:8px; font-size:13px; font-weight:600; transition:all 0.15s;
}
.btn-primary { background:var(--accent); color:#fff; }
.btn-primary:hover { background:var(--accent-hover); }
.btn-secondary { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--accent); color:var(--accent); }
.btn-sm { padding:5px 12px; font-size:12px; }

/* MODAL */
.modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:2000;
  display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; pointer-events:none; transition:opacity 0.2s;
}
.modal-overlay.active { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
  max-width:800px; width:100%; max-height:80vh; overflow-y:auto; padding:28px;
}
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
.modal-title { font-size:18px; font-weight:700; }
.modal-close { background:var(--surface2); border:1px solid var(--border); color:var(--text); width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; }
.modal-body { font-size:13px; line-height:1.8; white-space:pre-line; color:var(--text-muted); }
.modal-body h4 { color:var(--text); font-size:14px; margin:16px 0 8px; }
.modal-body .checklist-item { display:flex; gap:8px; align-items:flex-start; padding:4px 0; }
.modal-body .checklist-item::before { content:'☐'; color:var(--accent); flex-shrink:0; }

/* PROGRESS BAR */
.progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; transition:width 0.3s; }

/* TWO COL */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:24px; }

/* SECTION TITLE */
.section-title { font-size:18px; font-weight:700; margin:24px 0 16px; display:flex; align-items:center; gap:8px; }

/* CHART WRAP */
.chart-wrap { position:relative; height:350px; margin:16px 0; }
.chart-wrap canvas { width:100% !important; height:100% !important; }

/* FOOTER */
footer {
  text-align:center; padding:24px; font-size:12px; color:var(--text-dim);
  border-top:1px solid var(--border); margin-top:40px;
}
footer a { color:var(--text-muted); }

/* RESPONSIVE */
@media(max-width:1100px) {
  .kanban-container { grid-template-columns:repeat(3,1fr); }
  .kpi-grid { grid-template-columns:repeat(3,1fr); }
  .two-col { grid-template-columns:1fr; }
}
@media(max-width:768px) {
  .nav { padding:0 12px; gap:8px; overflow-x:auto; }
  .nav-link { display:none; }
  .main-content { padding:16px; }
  .kpi-grid { grid-template-columns:repeat(2,1fr); }
  .kanban-container { grid-template-columns:1fr; }
  .tab-btn { padding:8px 14px; font-size:12px; }
  .fin-grid { grid-template-columns:1fr; }
  .doc-grid { grid-template-columns:1fr; }
  .milestone-timeline { flex-wrap:wrap; gap:10px; }
}

/* ── Dark mode ──────────────────────────────────────────── */

}

function updateProforma() {
  const land = +document.getElementById('pf-land').value;
  const sqm = +document.getElementById('pf-sqm').value;
  const buildPerM2 = +document.getElementById('pf-buildcost').value;
  const softPct = +document.getElementById('pf-soft').value;
  const finRatio = +document.getElementById('pf-finratio').value / 100;
  const rate = +document.getElementById('pf-rate').value / 100;
  const months = +document.getElementById('pf-months').value;
  const salePrice = +document.getElementById('pf-saleprice').value;
  const monthlyRev = +document.getElementById('pf-monthlyrev').value;
  const saleCostPct = +document.getElementById('pf-salecost').value / 100;
  const type = document.querySelector('input[name="pf-type"]:checked').value;
  const isSale = (type === 'eladas' || type === 'vegyes');

  // Update display values
  document.getElementById('pf-land-val').textContent = fmt(land);
  document.getElementById('pf-sqm-val').textContent = fmt(sqm);
  document.getElementById('pf-buildcost-val').textContent = fmt(buildPerM2);
  document.getElementById('pf-soft-val').textContent = (+document.getElementById('pf-soft').value) + '%';
  document.getElementById('pf-finratio-val').textContent = (+document.getElementById('pf-finratio').value) + '%';
  document.getElementById('pf-rate-val').textContent = (+document.getElementById('pf-rate').value) + '%';
  document.getElementById('pf-months-val').textContent = months;
  document.getElementById('pf-saleprice-val').textContent = fmt(salePrice);
  document.getElementById('pf-monthlyrev-val').textContent = fmt(monthlyRev);
  document.getElementById('pf-salecost-val').textContent = (+document.getElementById('pf-salecost').value) + '%';

  // Calculations
  const buildCost = buildPerM2 * sqm;
  const softCost = (land + buildCost) * (softPct / 100);
  const totalHard = land + buildCost + softCost;
  const financed = totalHard * finRatio;
  const finCost = financed * rate * (months / 12);
  const totalCost = totalHard + finCost;

  let grossRevenue, netProfit, roi, annualYield, breakEvenM2, paybackMonths;

  if (isSale) {
    grossRevenue = salePrice * sqm;
    const saleCost = grossRevenue * saleCostPct;
    netProfit = grossRevenue - totalCost - saleCost;
    roi = totalCost > 0 ? (netProfit / totalCost * 100) : 0;
    annualYield = months > 0 ? (roi / (months / 12)) : 0;
    breakEvenM2 = sqm > 0 ? Math.round(totalCost / sqm) : 0;
    paybackMonths = null;
  } else {
    grossRevenue = monthlyRev * 12;
    const annualOpex = grossRevenue * 0.15;
    netProfit = grossRevenue - annualOpex;
    roi = totalCost > 0 ? (netProfit / totalCost * 100) : 0;
    annualYield = roi;
    breakEvenM2 = sqm > 0 ? Math.round(totalCost / sqm) : 0;
    paybackMonths = netProfit > 0 ? Math.round(totalCost / (netProfit / 12)) : 0;
  }

  const profitPct = isSale ? (grossRevenue > 0 ? (netProfit / grossRevenue * 100) : 0) : roi;
  const profitColor = profitPct > 20 ? 'var(--green)' : profitPct > 10 ? 'var(--gold)' : 'var(--red)';

  document.getElementById('pf-results').innerHTML = `
  <div class="kpi-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">
    <div class="kpi-card">
      <div class="kpi-label">Összes költség</div>
      <div class="kpi-value">${fmtMrd(totalCost)} Ft</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">${isSale ? 'Bruttó bevétel' : 'Éves bevétel'}</div>
      <div class="kpi-value" style="color:var(--green)">${fmtMrd(grossRevenue)} Ft</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">${isSale ? 'Nettó profit' : 'Éves nettó'}</div>
      <div class="kpi-value" style="color:${profitColor}">${fmtMrd(netProfit)} Ft</div>
      <div class="kpi-sub">${profitPct.toFixed(1)}%</div>
    </div>
  </div>
  <div class="kpi-grid" style="grid-template-columns:repeat(${paybackMonths !== null ? 4 : 3},1fr);margin-bottom:16px">
    <div class="kpi-card">
      <div class="kpi-label">ROI</div>
      <div class="kpi-value" style="color:var(--accent)">${roi.toFixed(1)}%</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Éves hozam</div>
      <div class="kpi-value">${annualYield.toFixed(1)}%</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Break-even ár/m²</div>
      <div class="kpi-value tabular">${fmt(breakEvenM2)}</div>
      <div class="kpi-sub">Ft/m²</div>
    </div>
    ${paybackMonths !== null ? `<div class="kpi-card">

      </tbody>
    </table>
  </div>`;

  // Sensitivity table
  if (isSale) {
    const saleMults = [0.9, 1.0, 1.1];
    const buildMults = [0.9, 1.0, 1.1];
    let sensHtml = `<table class="sens-table">
      <thead><tr><th></th><th>Ép.ktg -10%</th><th>Ép.ktg alap</th><th>Ép.ktg +10%</th></tr></thead><tbody>`;
    saleMults.forEach(sm => {
      sensHtml += `<tr><th>Elad.ár ${sm === 1 ? 'alap' : (sm < 1 ? '-10%' : '+10%')}</th>`;
      buildMults.forEach(bm => {
        const adjBuild = buildPerM2 * bm;
        const adjSale = salePrice * sm;
        const bc2 = adjBuild * sqm;
        const sc2 = (land + bc2) * (softPct / 100);
        const th2 = land + bc2 + sc2;
        const fc2 = th2 * finRatio * rate * (months / 12);
        const tc2 = th2 + fc2;
        const gr2 = adjSale * sqm;
        const np2 = gr2 - tc2 - gr2 * saleCostPct;
        const pct2 = gr2 > 0 ? (np2 / gr2 * 100) : 0;
        const cls = pct2 < 10 ? 'sens-cell-red' : pct2 < 20 ? 'sens-cell-yellow' : 'sens-cell-green';
        sensHtml += `<td class="${cls}">${pct2.toFixed(1)}%</td>`;
      });
      sensHtml += `</tr>`;
    });
    sensHtml += `</tbody></table>`;
    document.getElementById('pf-sensitivity').innerHTML = sensHtml;
  } else {
    document.getElementById('pf-sensitivity').innerHTML = `<p style="color:var(--text-muted);font-size:13px;">Érzékenységi elemzés csak eladásra szánt projekteknél érhető el.</p>`;
  }
}

function saveAsProject() {
  const name = document.getElementById('pf-name').value || 'Új projekt';

  const type = document.querySelector('input[name="pf-type"]:checked').value;
  const land = +document.getElementById('pf-land').value;

  const softPct = +document.getElementById('pf-soft').value;
  const months = +document.getElementById('pf-months').value;
  const salePrice = +document.getElementById('pf-saleprice').value;

  const buildCost = buildPerM2 * sqm;

  const id = 'DEV-' + String(STORE.devProjects.length + 1).padStart(3, '0');

  const endDate = new Date(now);
  endDate.setMonth(endDate.getMonth() + months);

  msDate.setMonth(msDate.getMonth() + 3);

  const newProject = {
    id, name, district, type: typeLabels[type] || type,
    units: Math.round(sqm / 60), sqm_total: sqm,
    land_cost: land, build_cost: buildCost, soft_cost: Math.round(softCost), total_cost: Math.round(totalCost),
    sale_price_m2: salePrice, revenue: salePrice * sqm,
    stage: "Telek keresés", stage_pct: 5,
    start_date: now.toISOString().slice(0,10),
    planned_end: endDate.toISOString().slice(0,10),
    next_milestone: msDate.toISOString().slice(0,10),
    next_milestone_label: "Telek véglegesítés",

  STORE.devProjects.push(newProject);
  alert(`✅ Projekt mentve: ${id} — ${name}\nLátható a Projekt pipeline fülön.`);

function renderMilestoneTimeline() {
  const idx = +document.getElementById('ms-project').value;
  const p = STORE.devProjects[idx];
  if (!p || !p.milestones) return;

  // status: 0=upcoming, 1=active, 2=completed
  let html = `<div class="milestone-timeline">`;
  p.milestones.forEach((m, i) => {
    const status = (p.milestone_status && p.milestone_status[i]) || 0;
    const cls = status === 2 ? 'completed' : status === 1 ? 'active' : 'upcoming';
    html += `
    <div class="milestone-node">
      <div class="milestone-dot ${cls}"></div>
      <div class="milestone-label">${m}</div>
    </div>`;
  });
  html += `</div>`;

  // Progress bar
  const completed = (p.milestone_status || []).filter(s => s === 2).length;
  const total = p.milestones.length;
  const pct = total > 0 ? (completed / total * 100) : 0;
  html += `
  <div style="margin-top:16px">
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:6px">
      <span>${p.name}</span>
      <span>${pct.toFixed(0)}% teljesítve (${completed}/${total} mérföldkő)</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${pct}%;background:var(--accent)"></div>
    </div>
  </div>
  <div style="margin-top:14px;font-size:13px;color:var(--text-muted)">
    <strong style="color:var(--text)">Következő:</strong> ${p.next_milestone_label} — ${p.next_milestone}<br>
    <strong style="color:var(--text)">Felelős:</strong> ${p.responsible}<br>
    <strong style="color:var(--text)">Megjegyzés:</strong> ${p.notes}
  </div>`;

  document.getElementById('ms-timeline').innerHTML = html;
}

function renderGanttTable() {
  const projects = STORE.devProjects;
  // Months from 2026-03 to 2028-12
  const months = [];
  for (let y = 2026; y <= 2028; y++) {
    for (let m = (y === 2026 ? 3 : 1); m <= 12; m++) {
      months.push({ year: y, month: m, label: `${y}.${String(m).padStart(2,'0')}` });
    }
  }

  let html = `<table class="gantt-table"><thead><tr><th style="text-align:left;min-width:140px">Projekt</th>`;
  months.forEach(m => {
    html += `<th>${m.month === 1 || m.month === 7 ? m.label : String(m.month).padStart(2,'0')}</th>`;
  });
  html += `</tr></thead><tbody>`;

  const barColors = ['#0071E3','#FF9F0A','#34C759','#FF9500','#a855f7','#5AC8FA','#FF3B30'];

  projects.forEach((p, pi) => {
    const pStart = new Date(p.start_date);
    const pEnd = new Date(p.planned_end);
    const color = barColors[pi % barColors.length];
    
    html += `<tr><td class="gantt-project-name" style="color:${color}">${p.id}</td>`;
    months.forEach(m => {
      const mStart = new Date(m.year, m.month - 1, 1);
      const mEnd = new Date(m.year, m.month, 0);
      const isActive = pStart <= mEnd && pEnd >= mStart;
      const isMs = p.next_milestone && new Date(p.next_milestone).getFullYear() === m.year && (new Date(p.next_milestone).getMonth() + 1) === m.month;
      
      html += `<td style="position:relative">`;
      if (isActive) {
        const pctStart = pStart > mStart ? ((pStart.getDate()-1) / mEnd.getDate() * 100) : 0;
        const pctEnd = pEnd < mEnd ? (pEnd.getDate() / mEnd.getDate() * 100) : 100;
        html += `<div class="gantt-bar" style="left:${pctStart}%;right:${100-pctEnd}%;background:${color}80"></div>`;
      }
      if (isMs) {
        html += `<div class="gantt-milestone" style="left:50%"></div>`;
      }
      html += `</td>`;
    });
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  document.getElementById('ms-gantt').innerHTML = html;
}

function renderAlerts() {
  const projects = STORE.devProjects;
  const now = NOW;
  let html = '';

  projects.forEach(p => {
    const msDate = new Date(p.next_milestone);
    const diff = daysDiff(now.toISOString().slice(0,10), p.next_milestone);

    if (diff < 0) {
      html += `<div class="alert-card alert-red">🚨 <strong>${p.name}:</strong> ${p.next_milestone_label} — ${Math.abs(diff)} napja lejárt!</div>`;
    } else if (diff <= 14) {
      html += `<div class="alert-card alert-yellow">⚠️ <strong>${p.name}:</strong> ${p.next_milestone_label} — ${diff} napon belül (${p.next_milestone})</div>`;
    }
  });

  if (!html) {
    html = `<div class="alert-card alert-green">✅ Nincs kritikus vagy közeli mérföldkő figyelmeztetés.</div>`;
  }

  document.getElementById('ms-alerts').innerHTML = html;
}

  html += `</div>`;

function openDocModal(docId) {
  const doc = DOCUMENTS.find(d => d.id === docId);
  if (!doc) return;
  document.getElementById('modalTitle').textContent = doc.title.replace(/^[^\s]+\s/, '');
  document.getElementById('modalBody').textContent = doc.content;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

function downloadDoc(docId) {
  const doc = DOCUMENTS.find(d => d.id === docId);
  if (!doc) return;
  const blob = new Blob([doc.content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = doc.id + '_' + doc.title.replace(/[^a-zA-ZÀ-žÁ-ű0-9]/g, '_').replace(/_+/g, '_') + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function calcSiteScore() {
  var ids = ['sc-kozlek','sc-hfsz','sc-ar','sc-infra','sc-vers','sc-arviz','sc-kozmu'];
  var total = 0;
  var answered = 0;
  ids.forEach(function(id){
    var el = document.getElementById(id);
    if (!el) return;
    var v = parseInt(el.value);
    if (!isNaN(v) && v >= 0) { total += v; answered++; }
  });
  var scoreEl = document.getElementById('site-score-total');
  var barEl = document.getElementById('site-score-bar');
  var verdictEl = document.getElementById('site-score-verdict');
  if (!scoreEl) return;
  scoreEl.textContent = total;
  if (barEl) barEl.style.width = total + '%';
  if (verdictEl && answered > 0) {
    verdictEl.style.display = 'block';
    if (total >= 80) {
      verdictEl.style.background = 'rgba(16,185,129,0.12)';
      verdictEl.style.color = '#34C759';
      verdictEl.style.border = '1px solid rgba(16,185,129,0.3)';
      verdictEl.textContent = '✅ KIVALÓ telek — Fejlesztésre erősen javasolt! (' + total + '/100)';
    } else if (total >= 60) {
      verdictEl.style.background = 'rgba(0,113,227,0.12)';
      verdictEl.style.color = '#0071E3';
      verdictEl.style.border = '1px solid rgba(0,113,227,0.3)';
      verdictEl.textContent = '👍 JÓ telek — További vizsgálat javasolt. (' + total + '/100)';
    } else if (total >= 40) {
      verdictEl.style.background = 'rgba(245,158,11,0.12)';
      verdictEl.style.color = '#FF9F0A';
      verdictEl.style.border = '1px solid rgba(245,158,11,0.3)';
      verdictEl.textContent = '⚠️ PROBLÉMÁS telek — Kompenzaláló tényezők szükségesek. (' + total + '/100)';
    } else {
      verdictEl.style.background = 'rgba(239,68,68,0.12)';
      verdictEl.style.color = '#FF3B30';
      verdictEl.style.border = '1px solid rgba(239,68,68,0.3)';
      verdictEl.textContent = '❌ GYENGE telek — Fejlesztésre NEM javasolt. (' + total + '/100)';
    }
  }
}

function recalcExitChart() {
  var costEl = document.getElementById('exit-cost');
  if (!costEl) return;
  var cost     = parseFloat(costEl.value) || 100000000;
  var yieldPct = parseFloat(document.getElementById('exit-yield').value) || 5.5;
  var growthPct= parseFloat(document.getElementById('exit-growth').value) || 6;
  var holdYears= parseInt(document.getElementById('exit-hold').value) || 10;

  var labels = [];
  var saleData = [];
  var rentData = [];
  var optimalYear = 1;
  var optimalDiff = Infinity;

  for (var n = 1; n <= holdYears; n++) {
    labels.push(n + '. év');
    var futureValue = cost * Math.pow(1 + growthPct / 100, n);
    var saleProfit  = (futureValue - cost) * 0.75; // 25% tax on gain
    var rentIncome  = cost * (yieldPct / 100) * n * 0.85; // 15% tax
    saleData.push(Math.round(saleProfit));
    rentData.push(Math.round(rentIncome));
    var diff = Math.abs(rentIncome - saleProfit);
    if (rentIncome >= saleProfit && diff < optimalDiff) {
      optimalDiff = diff;
      optimalYear = n;
    }
  }

  // if rental never overtakes, pick the last year
  if (optimalDiff === Infinity) optimalYear = holdYears;

  var kpiEl = document.getElementById('exit-optimal-kpi');
  if (kpiEl) {
    kpiEl.innerHTML = '<div style="background:var(--surface2);border:1px solid var(--accent);border-radius:var(--radius);padding:14px 20px;text-align:center">' +
      '<div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px">📌 Optimális exit</div>' +
      '<div style="font-size:28px;font-weight:800;color:var(--accent)">' + optimalYear + ' év</div>' +
      '<div style="font-size:11px;color:var(--text-muted);margin-top:4px">Bérleti jövedelem eléri/meghaladja az eladási profitot</div>' +
      '</div>';
  }

  if (window._exitChart) window._exitChart.destroy();
  var ctx = document.getElementById('exit-chart');
  if (!ctx) return;
  window._exitChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'Eladási profit (adó után)',
          data: saleData,
          borderColor: '#0071E3',
          backgroundColor: 'rgba(0,113,227,0.08)',
          fill: false,
          tension: 0.3,
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: '#0071E3'
        },
        {
          label: 'Felhalmozott bérleti bevétel (adó után)',
          data: rentData,
          borderColor: '#34C759',
          backgroundColor: 'rgba(16,185,129,0.08)',
          fill: false,
          tension: 0.3,
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: '#34C759'
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#1D1D1F', font: { size: 11 } } },
        tooltip: {
          callbacks: {
            label: function(c) { return c.dataset.label + ': ' + Number(c.parsed.y).toLocaleString('hu-HU') + ' Ft'; }
          }
        }
      },
      scales: {
        x: { ticks: { color: '#6E6E73' }, grid: { color: 'rgba(45,50,80,0.5)' } },
        y: { ticks: { color: '#6E6E73', callback: function(v){ return (v/1000000).toFixed(0) + ' M Ft'; } }, grid: { color: 'rgba(45,50,80,0.5)' } }
      }
    }
  });
}

function f1ShowOtek() {

  if (!o) { el.innerHTML = ''; return; }

  var telekM2 = 1000;

  var items = [
    {label:'Övezeti besorolás', value:o.otek, color:'var(--accent)'},

    {label:'Parkolási norma', value:o.parkolo, color:'var(--purple)'}
  ];
  items.forEach(function(k) {
    h += '<div class="kpi-card"><div class="kpi-label">' + k.label + '</div><div class="kpi-value" style="color:' + k.color + ';font-size:20px">' + k.value + '</div></div>';
  });
  h += '</div>';
  if (o.megj) {
    h += '<div class="alert-yellow" style="margin-bottom:16px"><span style="font-size:16px">⚠️</span> ' + o.megj + '</div>';
  }
  h += '<div style="background:var(--accent-light);border:1px solid rgba(0,113,227,0.3);border-radius:var(--radius);padding:16px;font-size:13px;line-height:1.7">';
  h += '<strong style="color:var(--accent)">🧮 Mit jelent ez a fejlesztőnek?</strong><br>';
  h += telekM2.toLocaleString('hu-HU') + ' m² telken max <strong>' + hasznos.toLocaleString('hu-HU') + ' m²</strong> hasznos alapterület építhető (SZM = ' + o.max_szm.toFixed(1) + '), ';
  h += 'ehhez <strong>' + lakasDb + ' lakás</strong> fér el átlagos ' + avgLakas + ' m²-es lakásméretnél. ';
  h += 'Parkolóhely szükséglet: <strong>' + Math.ceil(lakasDb * parseFloat(o.parkolo)) + ' db</strong> (' + o.parkolo + ').';
  h += '</div>';
  el.innerHTML = h;
}

function f1RenderResTable() {
  var data = F1_DISTRICT_DATA.slice().sort(function(a, b) {
    var va = a[_resSortCol], vb = b[_resSortCol];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    return _resSortAsc ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
  });

  function si(col) {
    if (_resSortCol !== col) return ' ↕';
    return _resSortAsc ? ' ↑' : ' ↓';
  }

  var zoneNames = {belso_buda:'Belső Buda',hegyvidek:'Hegyvidék',kulso_buda:'Külső Buda',atmeneti_pest:'Átmeneti Pest',belso_pest:'Belső Pest',kulso_pest:'Külső Pest',deli_buda:'Déli Buda'};

  var h = '<thead><tr>';
  h += '<th style="cursor:pointer" onclick="f1SortRes(\'district\')">Kerület' + si('district') + '</th>';
  h += '<th style="cursor:pointer" onclick="f1SortRes(\'zone\')">Zóna' + si('zone') + '</th>';
  h += '<th style="cursor:pointer" onclick="f1SortRes(\'gross_yield\')">Bérleti hozam (%)' + si('gross_yield') + '</th>';
  h += '<th style="cursor:pointer" onclick="f1SortRes(\'buy_m2\')">Vásárlási ár (Ft/m²)' + si('buy_m2') + '</th>';
  h += '<th style="cursor:pointer" onclick="f1SortRes(\'rent_m2\')">Bérleti díj (Ft/m²/hó)' + si('rent_m2') + '</th>';
  h += '<th>Rés értékelés</th>';
  h += '</tr></thead><tbody>';
  data.forEach(function(r) {
    var badge;
    if (r.gross_yield > 5.0) badge = '<span style="display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;background:rgba(16,185,129,0.15);color:#34C759">🟢 Vonzó fejlesztési célpont</span>';
    else if (r.gross_yield >= 4.5) badge = '<span style="display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;background:rgba(245,158,11,0.15);color:#FF9F0A">🟡 Közepes</span>';
    else badge = '<span style="display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;background:rgba(239,68,68,0.15);color:#FF3B30">🔴 Alacsony hozam</span>';
    h += '<tr>';
    h += '<td style="font-weight:700">' + r.district + '.</td>';
    h += '<td style="color:var(--text-muted);font-size:12px">' + (zoneNames[r.zone] || r.zone) + '</td>';
    h += '<td class="tabular" style="font-weight:700;color:' + (r.gross_yield > 5 ? '#34C759' : r.gross_yield >= 4.5 ? '#FF9F0A' : '#FF3B30') + '">' + r.gross_yield.toFixed(1) + '%</td>';
    h += '<td class="tabular">' + r.buy_m2.toLocaleString('hu-HU') + ' Ft</td>';
    h += '<td class="tabular">' + r.rent_m2.toLocaleString('hu-HU') + ' Ft</td>';
    h += '<td>' + badge + '</td>';
    h += '</tr>';
  });
  h += '</tbody>';
  document.getElementById('f1-res-table').innerHTML = h;
}

function f1SortRes(col) {
  if (_resSortCol === col) _resSortAsc = !_resSortAsc;
  else { _resSortCol = col; _resSortAsc = col === 'district'; }
  f1RenderResTable();
}

function f1RenderResChart() {
  if (window._resChart) window._resChart.destroy();
  var sorted = F1_DISTRICT_DATA.slice().sort(function(a,b){ return b.gross_yield - a.gross_yield; });
  var ctx = document.getElementById('res-chart').getContext('2d');
  window._resChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(function(r){ return r.district + '.'; }),
      datasets: [{
        label: 'Bruttó bérleti hozam (%)',
        data: sorted.map(function(r){ return r.gross_yield; }),
        backgroundColor: sorted.map(function(r){
          return r.gross_yield > 5.0 ? 'rgba(16,185,129,0.7)' : r.gross_yield >= 4.5 ? 'rgba(245,158,11,0.7)' : 'rgba(239,68,68,0.7)';
        }),
        borderColor: sorted.map(function(r){
          return r.gross_yield > 5.0 ? '#34C759' : r.gross_yield >= 4.5 ? '#FF9F0A' : '#FF3B30';
        }),
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: function(c){ return c.raw.toFixed(1) + '%'; } } }
      },
      scales: {
        x: { grid: { color: 'rgba(45,50,80,0.5)' }, ticks: { color: '#6E6E73', callback: function(v){ return v + '%'; } } },
        y: { grid: { display: false }, ticks: { color: '#1D1D1F', font: { size: 11, weight: 600 } } }
      }
    }
  });
}

function f1CalcPipeline() {
  var count = parseFloat(document.getElementById('f1-pipeline-count').value) || 0;
  var area = parseFloat(document.getElementById('f1-pipeline-area').value) || 1;
  var density = count / area;
  var label, color;
  if (density <= 1.5) { label = 'Alacsony verseny'; color = '#34C759'; }
  else if (density <= 3) { label = 'Közepes verseny'; color = '#FF9F0A'; }
  else { label = 'Magas verseny'; color = '#FF3B30'; }

  var el = document.getElementById('f1-pipeline-result');
  el.innerHTML = '<div class="kpi-card" style="width:100%;text-align:center;border-color:' + color + '">' +
    '<div class="kpi-label">Pipeline sűrűség</div>' +
    '<div class="kpi-value" style="color:' + color + '">' + density.toFixed(1) + ' projekt / km²</div>' +
    '<div class="kpi-sub" style="font-weight:700;color:' + color + '">' + label + '</div>' +
    '</div>';
}

function f2Calc() {
  var units = parseInt(document.getElementById('f2-units').value) || 20;
  var avgSize = parseInt(document.getElementById('f2-avgsize').value) || 60;
  var salePrice = parseInt(document.getElementById('f2-saleprice').value) || 1200000;
  var sellRate = parseFloat(document.getElementById('f2-sellrate').value) / 100 || 0.95;
  var buildCost = parseInt(document.getElementById('f2-buildcost').value) || 750000;
  var softPct = parseFloat(document.getElementById('f2-softpct').value) / 100 || 0.08;
  var finPct = parseFloat(document.getElementById('f2-finpct').value) / 100 || 0.06;
  var profitPct = parseFloat(document.getElementById('f2-profitpct').value) / 100 || 0.20;
  var landSize = parseInt(document.getElementById('f2-landsize').value) || 1500;

  var totalGFA = units * avgSize;
  var gdv = totalGFA * salePrice * sellRate;
  var buildTotal = totalGFA * buildCost;
  var softTotal = buildTotal * softPct;
  var finTotal = (buildTotal + softTotal) * finPct;
  var costsNoLand = buildTotal + softTotal + finTotal;
  var devProfit = gdv * profitPct;
  var maxLandPrice = gdv - costsNoLand - devProfit;
  var landPerM2 = landSize > 0 ? maxLandPrice / landSize : 0;

  // Formula display
  var fmt = function(v) { return Math.round(v).toLocaleString('hu-HU'); };
  var fEl = document.getElementById('f2-formula');
  fEl.innerHTML =
    '<div>1️⃣ <strong>GDV</strong> = ' + units + ' × ' + avgSize + ' m² × ' + salePrice.toLocaleString('hu-HU') + ' Ft × ' + (sellRate * 100).toFixed(0) + '% = <strong style="color:var(--accent)">' + fmt(gdv) + ' Ft</strong></div>' +
    '<div>2️⃣ <strong>Építési ktg</strong> = ' + units + ' × ' + avgSize + ' m² × ' + buildCost.toLocaleString('hu-HU') + ' Ft = <strong>' + fmt(buildTotal) + ' Ft</strong></div>' +
    '<div>3️⃣ <strong>Soft cost</strong> = ' + fmt(buildTotal) + ' × ' + (softPct * 100).toFixed(0) + '% = <strong>' + fmt(softTotal) + ' Ft</strong></div>' +
    '<div>4️⃣ <strong>Finanszírozási ktg</strong> = (' + fmt(buildTotal) + ' + ' + fmt(softTotal) + ') × ' + (finPct * 100).toFixed(0) + '% = <strong>' + fmt(finTotal) + ' Ft</strong></div>' +
    '<div>5️⃣ <strong>Összes ktg (telek nélkül)</strong> = ' + fmt(buildTotal) + ' + ' + fmt(softTotal) + ' + ' + fmt(finTotal) + ' = <strong>' + fmt(costsNoLand) + ' Ft</strong></div>' +
    '<div>6️⃣ <strong>Developer profit</strong> = ' + fmt(gdv) + ' × ' + (profitPct * 100).toFixed(0) + '% = <strong style="color:var(--gold)">' + fmt(devProfit) + ' Ft</strong></div>' +
    '<div style="margin-top:6px;font-size:14px">7️⃣ <strong style="color:var(--accent)">MAX TELEKÁR = GDV − Összes ktg − Profit = ' + fmt(maxLandPrice) + ' Ft</strong></div>' +
    '<div>8️⃣ <strong>Telek Ft/m²</strong> = ' + fmt(maxLandPrice) + ' / ' + landSize.toLocaleString('hu-HU') + ' m² = <strong>' + fmt(landPerM2) + ' Ft/m²</strong> = <strong>' + (landPerM2 / 1000).toFixed(0) + ' eFt/m²</strong></div>';

  // KPIs
  var kpis = [
    {label:'GDV (bevétel)', value: (gdv / 1000000).toFixed(0) + ' M Ft', color:'var(--accent)'},
    {label:'Összes ktg', value: (costsNoLand / 1000000).toFixed(0) + ' M Ft', color:'var(--red)'},
    {label:'Developer profit', value: (devProfit / 1000000).toFixed(0) + ' M Ft', color:'var(--gold)'},
    {label:'MAX TELEKÁR', value: (maxLandPrice / 1000000).toFixed(0) + ' M Ft', color: maxLandPrice > 0 ? 'var(--green)' : 'var(--red)'}
  ];
  var kh = '';
  kpis.forEach(function(k, i) {
    var extra = i === 3 ? 'border:2px solid var(--accent);background:var(--accent-light);' : '';
    kh += '<div class="kpi-card" style="' + extra + '">';
    kh += '<div class="kpi-label">' + k.label + '</div>';
    kh += '<div class="kpi-value" style="color:' + k.color + '">' + k.value + '</div>';
    kh += '</div>';
  });
  document.getElementById('f2-kpis').innerHTML = kh;

  // Comparison with market
  var dist = document.getElementById('f2-district').value;
  var comp = document.getElementById('f2-comparison');
  if (dist && F2_LAND_PRICES[dist]) {
    var lp = F2_LAND_PRICES[dist];
    var calcEft = landPerM2 / 1000;
    var status, statusColor;
    if (calcEft > lp.max) { status = '✅ MEGVALÓSÍTHATÓ — bőven van mozgástér'; statusColor = '#34C759'; }
    else if (calcEft >= lp.mid) { status = '⚠️ HATÁRÁN VAN — szoros kalkuláció'; statusColor = '#FF9F0A'; }
    else { status = '❌ NEM MEGVALÓSÍTHATÓ — a piaci telekár meghaladja a kalkulált maximumot'; statusColor = '#FF3B30'; }
    comp.innerHTML = '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-size:13px;line-height:1.7">' +
      'Piaci telek ár a <strong>' + dist + '. kerületben</strong>: <strong>' + lp.min + '–' + lp.max + ' eFt/m²</strong> (közép: ' + lp.mid + ' eFt/m²)<br>' +
      'Kalkulált max telekár: <strong>' + calcEft.toFixed(0) + ' eFt/m²</strong><br>' +
      '<span style="font-weight:700;font-size:14px;color:' + statusColor + '">' + status + '</span></div>';
  } else {
    comp.innerHTML = '<div style="font-size:12px;color:var(--text-dim);margin-top:8px">Válassz kerületet az összehasonlításhoz.</div>';
  }
}

function f2DdToggle(idx) {
  if (!STORE.dueDiligence) STORE.dueDiligence = {};
  var cb = document.getElementById('f2-dd-' + idx);
  STORE.dueDiligence['item_' + idx] = cb.checked;
  document.getElementById('f2-dd-' + idx + '-label').style.color = cb.checked ? '#34C759' : 'var(--text)';
  f2UpdateDdProgress();
}

function f2UpdateDdProgress() {
  if (!STORE.dueDiligence) STORE.dueDiligence = {};
  var total = 0, done = 0;
  Object.keys(F2_DD_ITEMS).forEach(function(g) { total += F2_DD_ITEMS[g].length; });
  for (var i = 0; i < total; i++) {
    if (STORE.dueDiligence['item_' + i]) done++;
  }
  var pct = total > 0 ? (done / total) * 100 : 0;
  var barColor = pct < 50 ? '#FF3B30' : pct < 80 ? '#FF9F0A' : '#34C759';
  var el = document.getElementById('f2-dd-progress');
  el.innerHTML = '<div style="font-size:13px;font-weight:600;margin-bottom:6px">' + done + ' / ' + total + ' ellenőrzés elvégezve (' + pct.toFixed(0) + '%)</div>' +
    '<div class="progress-bar" style="height:8px"><div class="progress-fill" style="width:' + pct.toFixed(0) + '%;background:' + barColor + '"></div></div>';
}

function calcPresales() {
  const units = parseFloat(document.getElementById('f3-units').value)||40;
  const avgPrice = parseFloat(document.getElementById('f3-avg-price').value)||85;
  const threshold = parseFloat(document.getElementById('f3-threshold').value)||30;
  const minUnits = Math.ceil(units * threshold/100);
  const minRevenue = (minUnits * avgPrice).toLocaleString('hu-HU');
  const totalGDV = (units * avgPrice).toLocaleString('hu-HU');
  document.getElementById('f3-presales-result').innerHTML = `
    <div style="display:grid;gap:10px">
      <div><div style="color:#6E6E73;font-size:11px">Min. előértékesített egységek</div><div style="color:#0071E3;font-size:22px;font-weight:700">${minUnits} db</div></div>
      <div><div style="color:#6E6E73;font-size:11px">Min. presales bevétel (M Ft)</div><div style="color:#34C759;font-size:22px;font-weight:700">${minRevenue}</div></div>
      <div><div style="color:#6E6E73;font-size:11px">Összes GDV (M Ft)</div><div style="color:#1D1D1F;font-size:18px;font-weight:600">${totalGDV}</div></div>
      <div style="background:#FFFFFF;border-radius:6px;padding:10px;font-size:12px;color:#6E6E73">
        ✅ Ha ${minUnits} db eladva → bank megkezdi a folyósítást<br>
        ⚠️ Előadás-vételi szerződések (ÁSZF) szükségesek<br>
        📌 10% fog laló + közjegyző ajánlott
      </div>
    </div>`;
}

function calcROE() {
  const cost = parseFloat(document.getElementById('f3-total-cost').value)||500;
  const equity = parseFloat(document.getElementById('f3-equity').value)||150;
  const gdv = parseFloat(document.getElementById('f3-gdv').value)||700;
  const profit = gdv - cost;
  const roi = ((profit/cost)*100).toFixed(1);
  const roe = ((profit/equity)*100).toFixed(1);
  const leverage = (cost/equity).toFixed(2);
  document.getElementById('f3-roe-result').innerHTML = `
    <div style="display:grid;gap:8px;font-size:13px">
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Nyereség</span><span style="color:#34C759;font-weight:700">${profit.toLocaleString('hu-HU')} M Ft</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">ROI (teljes tőkére)</span><span style="color:#0071E3;font-weight:700">${roi}%</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">ROE (saját tőkére)</span><span style="color:#e879f9;font-weight:700">${roe}%</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Tőkeáttétel</span><span style="color:#FF9F0A;font-weight:700">${leverage}x</span></div>
      <div style="background:#FFFFFF;border-radius:6px;padding:8px;font-size:11px;color:#6E6E73;margin-top:4px">
        ${roe > roi ? '✅ Pozitív tőkeáttétel: hitelezés növeli a hozamot' : '⚠️ Negatív tőkeáttétel: hitelköltség magasabb a projekt hozamánál'}
      </div>
    </div>`;
}

function updateF4Quiz() {
  const checks = ['q1','q2','q3','q4','q5','q6','q7','q8'];
  const checked = checks.filter(id => document.getElementById(id)?.checked);
  const res = document.getElementById('f4-quiz-result');
  if (!res) return;
  if (checked.length === 0) {
    res.innerHTML = '<span style="color:#6E6E73">Jelöld be az applicable pontokat az értékeléshez.</span>';
    return;
  }
  const hasMuemleki = document.getElementById('q6')?.checked;
  const needsPermit = checked.some(id => ['q1','q2','q3','q4','q5'].includes(id));
  let html = '';
  if (needsPermit || checked.length > 0) {
    html += '<div style="color:#FF3B30;font-weight:700;margin-bottom:8px">🏗 Építési engedély szükséges!</div>';
    html += '<div style="color:#6E6E73;font-size:12px">Bejelölt köteles tevékenységek alapján építési engedélykérelem benyújtása szükséges az ÉTDR rendszeren keresztül.</div>';
    if (hasMuemleki) html += '<div style="color:#FF9F0A;margin-top:8px;font-size:12px">⚠️ Örökségvédelmi érintettség miatt FORSTER/KÖH engedély is szükséges — +60–120 nap!</div>';
  }
  res.innerHTML = html || '<div style="color:#34C759">✅ A bejelölt munkák valószínűleg nem engedélykötelesek.</div>';
}

function calcF7Sell() {
  const buy = parseFloat(document.getElementById('f7-buy-price').value)||50;
  const sell = parseFloat(document.getElementById('f7-sell-price').value)||80;
  const reno = parseFloat(document.getElementById('f7-reno-cost').value)||0;
  const buyYear = parseInt(document.getElementById('f7-buy-year').value)||2022;
  const currentYear = 2026;
  const yearsDiff = currentYear - buyYear;
  const calculated = sell - buy - reno;
  const reductions = {0:1.0,1:1.0,2:0.9,3:0.6,4:0.3};
  const reduction = reductions[Math.min(yearsDiff,4)] ?? 0;
  const taxBase = calculated * reduction;
  const szja = Math.max(0, taxBase * 0.15);
  const net = sell - szja;
  document.getElementById('f7-sell-result').innerHTML = `
    <div style="display:grid;gap:8px;font-size:13px">
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Számított összeg</span><span style="color:#1D1D1F">${calculated.toFixed(1)} M Ft</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Szerzés óta (év)</span><span style="color:#1D1D1F">${yearsDiff} év</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Adóköteles hányad</span><span style="color:#FF9F0A">${(reduction*100).toFixed(0)}%</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Adóalap</span><span style="color:#1D1D1F">${taxBase.toFixed(1)} M Ft</span></div>

    </div>`;
}

function calcIlleték() {
  const val = parseFloat(document.getElementById('f7-illetek-value').value)||60;

function calcF8Exit() {
  const total = parseFloat(document.getElementById('f8-total-value').value)||500;
  const pct = parseFloat(document.getElementById('f8-exit-pct').value)||30;
  const cost = parseFloat(document.getElementById('f8-orig-cost').value)||300;
  const yr = parseInt(document.getElementById('f8-acq-year').value)||2022;
  const exitVal = total * pct/100;
  const costPortion = cost * pct/100;
  const profit = exitVal - costPortion;
  const yearsDiff = 2026 - yr;
  const reductions = {0:1.0,1:1.0,2:0.9,3:0.6,4:0.3};
  const red = reductions[Math.min(yearsDiff,4)]??0;
  const taxBase = profit * red;
  const szja = Math.max(0, taxBase * 0.15);
  const net = exitVal - szja;
  document.getElementById('f8-exit-result').innerHTML = `
    <div style="display:grid;gap:8px">
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Exit érték</span><span style="color:#1D1D1F">${exitVal.toFixed(1)} M Ft</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Arányos szerzési ár</span><span style="color:#6E6E73">${costPortion.toFixed(1)} M Ft</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Profit</span><span style="color:#34C759">${profit.toFixed(1)} M Ft</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Adóköteles hányad</span><span style="color:#FF9F0A">${(red*100).toFixed(0)}%</span></div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid #F5F5F7;padding-top:8px"><span style="color:#FF3B30">SZJA</span><span style="color:#FF3B30;font-weight:700">${szja.toFixed(1)} M Ft</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#34C759">Nettó bevétel</span><span style="color:#34C759;font-weight:700">${net.toFixed(1)} M Ft</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Maradék portfólió</span><span style="color:#e879f9;font-weight:700">${(total * (1-pct/100)).toFixed(1)} M Ft</span></div>
    </div>`;
}

function calcF8Portfolio() {
  const val = parseFloat(document.getElementById('f8-pf-value').value)||800;
  const yld = parseFloat(document.getElementById('f8-pf-yield').value)||5.5;
  const opex = parseFloat(document.getElementById('f8-pf-opex').value)||25;
  const debt = parseFloat(document.getElementById('f8-pf-debt').value)||20;
  const grossRev = val * yld/100;
  const opexAmt = grossRev * opex/100;
  const noi = grossRev - opexAmt;
  const netCF = noi - debt;
  const netYield = (noi/val*100).toFixed(2);
  const cashOnCash = (netCF/val*100).toFixed(2);
  document.getElementById('f8-pf-result').innerHTML = `
    <div style="display:grid;gap:8px">
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Bruttó bérleti bevétel</span><span style="color:#1D1D1F">${grossRev.toFixed(1)} M Ft/év</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Üzemeltetési ktg.</span><span style="color:#FF3B30">${opexAmt.toFixed(1)} M Ft/év</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">NOI (nettó működési eredmény)</span><span style="color:#34C759">${noi.toFixed(1)} M Ft/év</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Hiteltörlesztő</span><span style="color:#FF3B30">${debt.toFixed(1)} M Ft/év</span></div>
      <div style="display:flex;justify-content:space-between;border-top:1px solid #F5F5F7;padding-top:8px"><span style="color:#34C759">Nettó cash-flow</span><span style="color:#34C759;font-weight:700">${netCF.toFixed(1)} M Ft/év</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Nettó hozam (Cap Rate)</span><span style="color:#0071E3;font-weight:700">${netYield}%</span></div>
      <div style="display:flex;justify-content:space-between"><span style="color:#6E6E73">Cash-on-Cash hozam</span><span style="color:#e879f9;font-weight:700">${cashOnCash}%</span></div>
    </div>`;
}

.ib-msg.bot{align-self:flex-start;background:#F5F5F7;border-bottom-left-radius:4px}
.ib-msg.user{align-self:flex-end;background:#0071E3;color:#fff;border-bottom-right-radius:4px}
.ib-msg .ib-ts{display:block;font-size:10px;color:rgba(255,255,255,.35);margin-top:5px}
.ib-msg.bot .ib-ts{color:rgba(255,255,255,.3)}
.ib-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 14px 10px}
.ib-chip{background:#F5F5F7;border:1px solid rgba(0,113,227,.3);color:#6E6E73;font-size:11px;padding:6px 12px;border-radius:20px;cursor:pointer;transition:all .15s}
.ib-chip:hover{background:#0071E3;color:#fff;border-color:#0071E3}
.ib-typing{align-self:flex-start;display:flex;gap:4px;padding:10px 18px;background:#F5F5F7;border-radius:14px;border-bottom-left-radius:4px}
.ib-typing span{width:7px;height:7px;background:#0071E3;border-radius:50%;animation:ibDot 1.4s infinite ease-in-out both}
.ib-typing span:nth-child(1){animation-delay:-.32s}
.ib-typing span:nth-child(2){animation-delay:-.16s}
.ib-input-bar{display:flex;padding:10px;gap:8px;border-top:1px solid rgba(255,255,255,.07);background:#F5F5F7}
.ib-input-bar input{flex:1;background:#F5F5F7;border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:10px 16px;color:#1D1D1F;font-size:13px;outline:none}
.ib-input-bar input::placeholder{color:#555}
.ib-input-bar input:focus{border-color:#0071E3}
.ib-send{background:#0071E3;border:none;border-radius:50%;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.ib-send:hover{background:#3a5fcc}
.ib-send svg{width:18px;height:18px;fill:#fff}

function getAssistantResponse(q){
var ql=q.toLowerCase().replace(/[?!.,]/g,'');
var best=null,bestScore=0;
for(var i=0;i<KB.length;i++){var score=0;for(var j=0;j<KB[i].k.length;j++){if(ql.indexOf(KB[i].k[j])!==-1)score+=KB[i].k[j].length}if(score>bestScore){bestScore=score;best=KB[i]}}
if(best)return best.a;
var suggestions=[];
if(/kerület|district/.test(ql))suggestions.push('index.html (piaci áttekintés)','simulator.html (fordított keresés)');
if(/pénz|cost|ár|price/.test(ql))suggestions.push('simulator.html (kalkulátorok)','development.html (pro forma)');
if(/bérl|rent/.test(ql))suggestions.push('index.html (bérleti térkép)','crm.html (bérlő kezelés)');
if(/fejleszt|build|épít/.test(ql))suggestions.push('development.html (fejlesztési tracker)');
if(suggestions.length>0)return 'Ezt a kérdést nem találom az adatbázisomban, de lehet, hogy ezeken az oldalakon megtalálod:\n• '+suggestions.join('\n• ')+'\nPróbáld pontosítani a kérdést!';
return 'Ezt a kérdést nem találom az adatbázisomban. Próbáld pontosítani, vagy kérdezz rá a következő témákra: szimulátor, bérleti díjak, hozamszámítás, adózás, fejlesztés, OTÉK, due diligence, CRM, parkoló, kollégium, ingatlankezelés.';
}

var msgs=document.getElementById('ib-msgs'),input=document.getElementById('ib-input'),chips=document.getElementById('ib-chips'),closeBtn=panel.querySelector('.ib-close'),sendBtn=panel.querySelector('.ib-send'),isOpen=false,chipsShown=true;
if(typeof window._APP_STORE==='undefined')window._APP_STORE={};

var SUGGESTED=['Hogyan számolok fejlesztési hozamot?','Melyik kerületbe érdemes beruházni?','Hol találom az adózási kalkulátort?','Mi a Land Residual módszer?','Hogyan működik a közmű kapacitás ellenőrzés?','Mikor frissülnek az adatok?'];

function ts(){var d=new Date();return(d.getHours()<10?'0':'')+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes()}
function addMsg(text,who){var div=document.createElement('div');div.className='ib-msg '+who;div.innerHTML=text.replace(/\n/g,'<br>')+'<span class="ib-ts">'+ts()+'</span>';msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;window._APP_STORE.chatHistory.push({who:who,text:text,time:ts()})}
function showTyping(){var t=document.createElement('div');t.className='ib-typing';t.id='ib-typing';t.innerHTML='<span></span><span></span><span></span>';msgs.appendChild(t);msgs.scrollTop=msgs.scrollHeight}
function hideTyping(){var t=document.getElementById('ib-typing');if(t)t.remove()}
function sendMessage(text){if(!text||!text.trim())return;addMsg(text.trim(),'user');input.value='';if(chipsShown){chips.style.display='none';chipsShown=false}showTyping();setTimeout(function(){hideTyping();addMsg(getAssistantResponse(text.trim()),'bot')},600)}

btn.addEventListener('click',function(){isOpen=!isOpen;if(isOpen){panel.classList.add('open');btn.querySelector('.ib-badge').style.display='none';input.focus();if(msgs.children.length===0&&window._APP_STORE.chatHistory.length===0)addMsg('Üdvözöllek! Az IB Assistant vagyok. Kérdezz bátran a Budapest Dashboard rendszerről — segítek eligazodni a modulok, kalkulátorok és adatok között.','bot')}else{panel.classList.remove('open')}});
